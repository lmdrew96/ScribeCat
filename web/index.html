<!doctype html>
<meta charset="utf-8">
<title>ScribeCat</title>
<link rel="stylesheet" href="style.css">
<div class="topbar">
  <img class="logo" src="assets/nugget.png" alt="Nugget">
  <div class="title">ScribeCat — Dev UI</div>
  <div class="right"><span id="net">checking…</span></div>
</div>
<main>
  <section class="card">
    <h1>It’s alive.</h1>
    <p>This is the dev UI served from <code>http://localhost:1420/</code>.</p>
    <p id="hint">Hotkeys: H toggles the status dialog</p>
    <button id="demo">Open status</button>
  </section>
</main>

<div id="overlay" data-modal role="dialog" aria-modal="true" aria-labelledby="overlay-title" hidden>
  <div class="panel" tabindex="-1">
    <h2 id="overlay-title">Status</h2>
    <ul>
      <li>Static server <span id="static">checking…</span></li>
      <li>Internet <span id="internet">checking…</span></li>
      <li>Build <span id="build">dev</span></li>
    </ul>
    <button id="close" data-close>Close</button>
  </div>
</div>

<script src="app.js"></script>

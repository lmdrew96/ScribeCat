<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ScribeCat</title>

<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="nugget-180.png">
<link rel="icon" type="image/png" sizes="32x32"  href="nugget-32.png">
<link rel="icon" type="image/png" sizes="16x16"  href="nugget-16.png">

<style>
:root{
  --bg:#f7f7fb; --fg:#1b1431; --accent:#ffd34d; --outline:#2b0f50;
  --notes-bg:#fff; --notes-fg:#1b1431; --maxw:1200px;
  --ui-font:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto;
  --topbar-h:116px; --brand-img:60px; --title-size:30px; --ctrl-h:44px;
  --gap:12px; --card-pad:12px; --split:56%;
}
html,body{height:100%}
body{height:100vh;overflow:hidden;margin:0;background:var(--bg);color:var(--fg);
     font:15px/1.45 var(--ui-font)}
.container{max-width:var(--maxw);margin:0 auto;padding:14px; height:calc(100vh - var(--topbar-h) - 28px)}
.top{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid #e6e6f0;padding:14px 18px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,input,button{height:var(--ctrl-h);font:14px/1.2 inherit}
button{padding:10px 14px;border:1px solid #d0d7de;border-radius:10px;background:#fff;cursor:pointer}
button.primary{background:var(--accent);border-color:#e3b92a}
button.ghost{background:transparent;border:0}
.brand{display:flex;align-items:center;gap:10px;font-weight:900}
.brand strong{font-size:var(--title-size); letter-spacing:.3px}
.brand img{width:var(--brand-img);height:var(--brand-img);object-fit:cover;border-radius:8px;image-rendering:-webkit-optimize-contrast}
.badges{display:flex;gap:8px;align-items:center;font-size:13px;color:#6b6b7a}
.badge{padding:4px 8px;border-radius:999px;border:1px solid #ddd;background:#fff}

#gear{font-size:26px}
#vu{height:12px;background:#eaeaf3;border-radius:12px;overflow:hidden;flex:1;min-width:160px}
#vu>div{height:100%;width:0;background:#2ee6a6;transition:width .08s}

.card{background:#fff;border:1px solid #e0e0ea;border-radius:12px;padding:var(--card-pad);margin-top:12px}
.card h2, .card label, .card .badges, .card .toolbar{color:var(--outline)}
#drawer{position:fixed;right:12px;top:calc(var(--topbar-h) + 12px);bottom:12px;width:440px;
  background:#f3f6ff;border:1px solid #dbe1ff;border-radius:14px;padding:10px 12px;overflow:auto;display:none;z-index:20}
.drawer-card{background:#fff;border:1px solid #dbe1ff;border-radius:10px;padding:10px;margin-bottom:10px}
#drawer h4,#drawer label,#drawer .hint,#drawer .badge{color:var(--outline)}
.hint{font-size:12px;color:#6b6b7a}
.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#f2f2f7;border:1px solid #ddd;border-radius:6px;padding:0 6px}

.pane-root{display:flex;gap:var(--gap);height:100%}
.pane{flex:1;min-height:220px;display:flex;flex-direction:column;height:100%}
#splitter{width:10px;cursor:col-resize;background:linear-gradient(90deg,transparent 0 4px,#d9d9e8 4px 6px,transparent 6px);border-radius:8px}
.stacked .pane-root{flex-direction:column}
.stacked #splitter{display:none}

#notes,#live{flex:1;min-height:180px;background:var(--notes-bg);color:var(--notes-fg);
  border:1px solid #e0e0ea;border-radius:10px;padding:10px;overflow:auto;max-height:60vh}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:6px 8px;border:1px solid #ddd;border-radius:10px;background:#fff}
.toolbar button{width:30px;height:30px;border:0;background:transparent;border-radius:8px}
.toolbar button:hover{background:rgba(0,0,0,.06)}

.version{position:fixed;right:8px;bottom:6px;font:11px/1.2 ui-sans-serif;opacity:.7}

#ask{position:fixed;left:10px;bottom:12px;z-index:99}
#ask button{border-radius:999px}
#askPanel{position:fixed;left:10px;bottom:58px;width:340px;max-height:60vh;overflow:auto;background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:10px;display:none;box-shadow:0 6px 24px rgba(0,0,0,.15)}
#askPanel textarea{width:100%;height:120px}
</style>
</head>
<body>

<div class="top">
  <div class="row" style="min-height:var(--topbar-h)">
    <div class="brand">
      <img src="nugget-180.png" alt="ScribeCat">
      <strong id="brandTitle" style="color:var(--outline)">ScribeCat</strong>
    </div>
    <div style="margin-left:auto" class="badges" id="rightBadges">
      <span id="clock"  class="badge">—</span>
      <span id="status" class="badge">idle</span>
      <span id="polish" class="badge" style="display:none">polishing…</span>
      <button id="gear" class="ghost" title="Settings">⚙️</button>
    </div>
  </div>

  <div class="row" style="margin-top:8px">
    <select id="class"></select>
    <button id="manage" class="ghost">Manage</button>
    <input id="title" placeholder="Title (auto)" style="flex:1;min-width:220px">
    <select id="mic"></select>
    <div id="vu"><div></div></div>
  </div>

  <div class="row" style="margin-top:8px">
    <button id="start"  class="primary">Start</button>
    <button id="pause">Pause</button>
    <button id="resume">Resume</button>
    <button id="stop">Stop</button>
    <button id="summary">Summary</button>
    <button id="save">Save</button>
  </div>
</div>

<div class="container" id="main">
  <div class="pane-root" id="paneRoot">
    <div class="pane" id="paneNotes">
      <div class="card">
        <h2>Notes</h2>
        <div class="toolbar" id="ntb">
          <button data-cmd="undo" title="Undo">↶</button>
          <button data-cmd="redo" title="Redo">↷</button>
          <button data-cmd="bold" title="Bold"><b>B</b></button>
          <button data-cmd="italic" title="Italic"><i>I</i></button>
          <button data-cmd="underline" title="Underline"><u>U</u></button>
          <button data-list="ul" title="Bulleted list">•</button>
          <button data-list="ol" title="Numbered list">1.</button>
          <button id="quote" title="Quote">“”</button>
          <button id="h1" title="H1">H1</button>
          <button id="h2" title="H2">H2</button>
          <!-- size / color -->
          <input id="fontSizePx" list="sizes4to60" placeholder="size px" style="width:72px;height:30px">
          <datalist id="sizes4to60">
            <!-- 4..60 -->
            <!-- generated below by JS if missing -->
          </datalist>
          <input type="color" id="txtColor" title="Text color">
          <input type="color" id="hlColor"  title="Highlighter">
          <button id="clearFmt" title="Clear formatting">🧹</button>
        </div>
        <div id="notes" contenteditable="true"></div>
      </div>
    </div>

    <div id="splitter" title="Drag to resize"></div>

    <div class="pane" id="paneLive">
      <div class="card">
        <div class="row" style="justify-content:space-between;align-items:center">
          <h2 style="margin:0">Live Transcript</h2>
          <label class="badges" style="margin-left:auto"><input type="checkbox" id="showSentences" checked> sentence mode</label>
        </div>
        <div id="live"></div>
      </div>
    </div>
  </div>
</div>

<!-- Settings Drawer -->
<div id="drawer">
  <div class="drawer-card">
    <h4>Preset themes</h4>
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <select id="preset">
        <option>Lavender Butter</option>
        <option>Midnight Neon</option>
        <option>Mojito</option>
        <option>Grape Soda (HC)</option>
        <option>Paper Black</option>
        <option>Sunrise</option>
      </select>
      <button id="apply">Apply</button>
    </div>
  </div>

  <div class="drawer-card">
    <h4>Theme & Colors</h4>
    <div class="row" style="gap:10px;flex-wrap:wrap">
      <label>Background <input type="color" id="c_bg" value="#f7f7fb"></label>
      <label>Text <input type="color" id="c_fg" value="#1b1431"></label>
      <label>Accent <input type="color" id="c_accent" value="#ffd34d"></label>
      <label>Outline <input type="color" id="c_outline" value="#2b0f50"></label>
      <label>Notes bg <input type="color" id="c_nbg" value="#ffffff"></label>
      <label>Notes text <input type="color" id="c_nfg" value="#1b1431"></label>
    </div>
  </div>

  <div class="drawer-card">
    <h4>Typography</h4>
    <div class="row" style="gap:10px;flex-wrap:wrap">
      <label>Font
        <select id="fontSel">
          <option value="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">System UI</option>
          <option value="Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Inter</option>
          <option value="Atkinson Hyperlegible,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Atkinson Hyperlegible</option>
          <option value="IBM Plex Sans,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">IBM Plex Sans</option>
          <option value="Nunito,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Nunito</option>
          <option value="Noto Sans,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Noto Sans</option>
          <option value="PT Sans,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">PT Sans</option>
          <option value="Poppins,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Poppins</option>
          <option value="Figtree,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Figtree</option>
          <option value="Montserrat,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Montserrat</option>
          <option value="Merriweather Sans,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Merriweather Sans</option>
          <option value="Source Sans 3,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Source Sans 3</option>
          <option value="Avenir Next,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Avenir Next</option>
          <option value="SF Pro Text,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">SF Pro Text</option>
          <option value="Gill Sans,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Gill Sans</option>
          <option value="Trebuchet MS,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Trebuchet MS</option>
          <option value="Verdana,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto">Verdana</option>
          <option value="Georgia,serif">Georgia (serif)</option>
          <option value="Charter,serif">Charter (serif)</option>
          <option value="Iosevka,ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">Iosevka (mono)</option>
        </select>
      </label>
      <label>Page width <input id="maxw" type="range" min="900" max="1400" step="10" value="1200"></label>
    </div>
  </div>

  <div class="drawer-card">
    <h4>Layout</h4>
    <div class="row" style="gap:10px;flex-wrap:wrap">
      <label>Mode
        <select id="layoutMode">
          <option value="split">Split (side-by-side)</option>
          <option value="stacked">Stacked (vertical)</option>
        </select>
      </label>
      <label>Split ratio <input id="splitRatio" type="range" min="30" max="70" value="56"></label>
      <label>Density
        <select id="densitySel">
          <option value="0.90">Cozy</option>
          <option value="1.00" selected>Comfortable</option>
          <option value="1.10">Spacious</option>
        </select>
      </label>
      <button id="resetLayout">Reset layout</button>
    </div>
  </div>

  <div class="drawer-card">
    <h4>Classes</h4>
    <textarea id="classesBox" placeholder="One class per line" style="width:100%;height:110px"></textarea>
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <button id="saveClasses">Save list</</button>
      <button id="importCanvasLocal">Import from Canvas (local)</button>
      <label class="badge">.ics upload <input id="icsFile" type="file" accept=".ics"></label>
      <div class="hint">Bookmarklet available below.</div>
    </div>
  </div>

  <div class="drawer-card">
    <h4>Behaviors</h4>
    <label><input type="checkbox" id="b_sentence" checked> Sentence mode by default</label><br>
    <label><input type="checkbox" id="b_autoretry" checked> Auto-retry live transcription</label><br>
    <label><input type="checkbox" id="b_markers" checked> Cmd+M add time marker</label><br>
    <label><input type="checkbox" id="b_polish"> Auto-polish on Stop</label><br>
    <label><input type="checkbox" id="b_autoscroll" checked> Auto-scroll transcript</label><br>
    <label><input type="checkbox" id="b_timestamps"> Show timestamps in transcript</label>
  </div>

  <div class="drawer-card">
    <h4>Canvas bookmarklet</h4>
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <button id="copyBm">Copy bookmarklet</button>
      <textarea id="bmlet" readonly style="width:100%;height:90px"></textarea>
    </div>
  </div>

  <div class="drawer-card">
    <h4>Danger zone</h4>
    <button id="quit" style="background:#ffe3e3;border-color:#ffb3b3">Quit ScribeCat</button>
  </div>
</div>

<div id="ask">
  <button id="askBtn" class="primary">Ask AI</button>
</div>
<div id="askPanel">
  <div class="row" style="justify-content:space-between"><strong>Ask ScribeCat</strong><button id="askClose" class="ghost">✕</button></div>
  <label class="hint"><input type="checkbox" id="askCtx" checked> include notes & transcript as context</label>
  <textarea id="askInput" placeholder="Question…"></textarea>
  <div class="row" style="gap:8px"><button id="askSend" class="primary">Send</button><button id="askPaste">Paste to Notes</button></div>
  <pre id="askOut" style="white-space:pre-wrap"></pre>
</div>

<div class="version">ScribeCat v1.9.7</div>

<script>
const API = "http://localhost:8787";
const el = id => document.getElementById(id);
const $class=el("class"), $title=el("title"), $mic=el("mic"), $vu=el("vu").firstElementChild;
const $start=el("start"), $pause=el("pause"), $resume=el("resume"), $stop=el("stop"), $save=el("save"), $summary=el("summary");
const $notes=el("notes"), $live=el("live"), $status=el("status"), $clock=el("clock"), $brandTitle=el("brandTitle");
const $gear=el("gear"), $drawer=el("drawer"), $paneRoot=el("paneRoot"), $splitter=el("splitter");

let mediaStream, audioCtx, processor, source, ws, running=false, paused=false, sentBuf="";
let transcriptText = "", confidenceAvg = 0, confN=0, startTs=null, className="", reconnects=0, stopping=false;
let askAnswer="";

// clock
setInterval(()=>{ $clock.textContent = new Date().toLocaleString(); }, 1000);

// presets (contrast-safe)
const presets = {
  "Lavender Butter": {bg:"#f3e8ff", fg:"#1b1431", accent:"#ffd34d", outline:"#2b0f50", notesBg:"#fff", notesFg:"#1b1431"},
  "Midnight Neon":   {bg:"#080c19", fg:"#ffffff", accent:"#00ffd1", outline:"#7aa0ff", notesBg:"#0c1226", notesFg:"#ffffff"},
  "Mojito":          {bg:"#e8fff3", fg:"#0f2d1f", accent:"#18bf79", outline:"#0d5a3b", notesBg:"#ffffff", notesFg:"#0f2d1f"},
  "Grape Soda (HC)": {bg:"#22073a", fg:"#ffffff", accent:"#ffd766", outline:"#b07ad6", notesBg:"#2c0d4d", notesFg:"#ffffff"},
  "Paper Black":     {bg:"#ffffff", fg:"#0e0e10", accent:"#111111", outline:"#2c2c32", notesBg:"#ffffff", notesFg:"#0e0e10"},
  "Sunrise":         {bg:"#fff6e7", fg:"#20120a", accent:"#ff7a59", outline:"#2f1408", notesBg:"#ffffff", notesFg:"#20120a"}
};
function applyTheme(p){
  document.body.style.background=p.bg; document.body.style.color=p.fg;
  document.documentElement.style.setProperty("--notes-bg", p.notesBg);
  document.documentElement.style.setProperty("--notes-fg", p.notesFg);
  document.documentElement.style.setProperty("--accent", p.accent);
  document.documentElement.style.setProperty("--outline", p.outline);
  document.querySelectorAll('button.primary').forEach(b=>{b.style.background=p.accent; b.style.color=(p.fg==="#ffffff" && p.accent==="#ffd34d")?"#1b1431":"#000"});
  document.querySelectorAll('.card').forEach(c=>c.style.borderColor=p.outline);
  $brandTitle.style.color = p.outline;
}

// theme UI
el("apply").onclick = ()=>{ const p = presets[el("preset").value]; if (p) applyTheme(p); };
["c_bg","c_fg","c_accent","c_outline","c_nbg","c_nfg"].forEach(id=>{
  el(id).addEventListener("input", ()=>{
    const v = el(id).value;
    if (id==="c_bg") document.body.style.background=v;
    if (id==="c_fg") document.body.style.color=v;
    if (id==="c_nbg") document.documentElement.style.setProperty("--notes-bg", v);
    if (id==="c_nfg") document.documentElement.style.setProperty("--notes-fg", v);
    if (id==="c_accent"){ document.documentElement.style.setProperty("--accent", v); document.querySelectorAll('button.primary').forEach(b=>b.style.background=v); }
    if (id==="c_outline"){ document.documentElement.style.setProperty("--outline", v); document.querySelectorAll('.card').forEach(c=>c.style.borderColor=v); $brandTitle.style.color=v; }
  });
});
el("fontSel").onchange = ()=>{ document.documentElement.style.setProperty("--ui-font", el("fontSel").value); };
el("maxw").oninput = ()=>{ document.documentElement.style.setProperty("--maxw", el("maxw").value+"px"); };

// classes (with "Other…")
(function bootClasses(){
  const saved = JSON.parse(localStorage.getItem("lc_classes")||"[]");
  renderClassOptions(saved);
  el("saveClasses").onclick = ()=>{
    const list = el("classesBox").value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    localStorage.setItem("lc_classes", JSON.stringify(list));
    renderClassOptions(list);
    alert("Saved.");
  };
  el("importCanvasLocal").onclick = async ()=>{
    try{
      const r = await fetch(API+"/api/canvas-pull"); const j = await r.json();
      const list = (j.courses||[]).map(c=>cleanCourseName(c.name)).filter(Boolean);
      const prev = JSON.parse(localStorage.getItem("lc_classes")||"[]");
      const merged = [...new Set([ ...prev, ...list ])].sort();
      localStorage.setItem("lc_classes", JSON.stringify(merged));
      renderClassOptions(merged);
      el("classesBox").value = merged.join("\n");
      alert(`Imported ${list.length} classes.`);
    }catch(e){ alert("Import failed: "+e.message); }
  };
  // bookmarklet payload via #hash
  if (location.hash.startsWith("#classes=")) {
    try{
      const arr = JSON.parse(decodeURIComponent(location.hash.slice(9)));
      const cleaned = arr.map(cleanCourseName).filter(Boolean);
      const prev = JSON.parse(localStorage.getItem("lc_classes")||"[]");
      const merged = [...new Set([...prev, ...cleaned])].sort();
      localStorage.setItem("lc_classes", JSON.stringify(merged));
      renderClassOptions(merged);
      el("classesBox").value = merged.join("\n");
      history.replaceState(null,"",location.pathname+location.search);
      alert(`Imported ${cleaned.length} classes from Canvas.`);
    }catch{}
  }
})();
function cleanCourseName(n){
  if(!n) return "";
  n = n.replace(/\b\d{2}F-[A-Z]+\d{3,}-\d{3}\d{4}\b.*$/,'').replace(/\b25F-[A-Z]+\d{3,}-\d{3}\b.*$/,'');
  const m = n.match(/\b([A-Z]{2,}\d{2,}[A-Z]?)\s*:\s*(.+)$/);
  if (m) return `${m[1]}: ${m[2]}`.trim();
  n = n.replace(/\s*—\s*/g,' — ').replace(/\s{2,}/g,' ').trim();
  return n;
}
function renderClassOptions(list){
  $class.innerHTML = '<option value="">Choose class…</option>'
    + list.map(n=>`<option>${n}</option>`).join("")
    + '<option value="__other__">Other…</option>';
}
$class.onchange = ()=>{
  if ($class.value==="__other__"){
    const n = prompt("Enter class name:")||"";
    if (n.trim()){ className = n.trim(); $title.value = `${className} — ${new Date().toISOString().slice(0,10)}`; }
    $class.value = "";
  } else {
    className = $class.value || "";
    $title.value = className ? `${className} — ${new Date().toISOString().slice(0,10)}` : "";
  }
};

// ICS upload
(()=>{ const ics = document.getElementById('icsFile'); if(!ics) return;
  ics.addEventListener('change', async e=>{
    const f = e.target.files?.[0]; if(!f) return;
    const txt = await f.text();
    const names = [...txt.matchAll(/^SUMMARY:(.+)$/mg)].map(m=>cleanCourseName(m[1].trim()));
    const prev = JSON.parse(localStorage.getItem("lc_classes")||"[]");
    const merged = [...new Set([...prev, ...names])].filter(Boolean).sort();
    localStorage.setItem("lc_classes", JSON.stringify(merged));
    renderClassOptions(merged); el("classesBox").value = merged.join("\n");
    alert(`Imported ${names.length} entries from .ics`);
  });
})();

// bookmarklet text + copy
el("bmlet").value =
"javascript:(()=>{try{const sel=(...qs)=>qs.flatMap(q=>[...document.querySelectorAll(q)]);const texts=sel('[data-automation=dashboardCard__link]','.ic-DashboardCard__header-title','a.ig-title','.context_list_context a').map(a=>a.textContent.trim()).filter(Boolean);const uniq=[...new Set(texts)];const cleaned=uniq.map(t=>t.replace(/\\b\\d{2}F-[A-Z]+\\d{3,}-\\d{3}\\d{4}\\b.*$/,'').replace(/\\b25F-[A-Z]+\\d{3,}-\\d{3}\\b.*$/,'').replace(/\\s*—\\s*/g,' — ').replace(/\\s{2,}/g,' ').trim()).filter(Boolean);const url='http://localhost:8000/#classes='+encodeURIComponent(JSON.stringify(cleaned));window.open(url,'_blank');}catch(e){alert('ScribeCat bookmarklet error: '+e.message)}})();";
el("copyBm").onclick = async ()=>{ await navigator.clipboard.writeText(el("bmlet").value); alert("Bookmarklet copied. Create a bookmark and paste into URL field."); };

// mic list (permission prompt if labels blank)
async function ensureMicAccess(){ try { await navigator.mediaDevices.getUserMedia({audio:true}); } catch(e){} }
async function listMics(){
  let devs = await navigator.mediaDevices.enumerateDevices();
  let auds = devs.filter(d=>d.kind==="audioinput");
  if (auds.length && auds.every(d=>!d.label)) { await ensureMicAccess(); devs = await navigator.mediaDevices.enumerateDevices(); auds = devs.filter(d=>d.kind==="audioinput"); }
  const cur = $mic.value;
  $mic.innerHTML = auds.map(d=>`<option value="${d.deviceId}">${d.label||"(default)"}</option>`).join("") || `<option value="">(default)</option>`;
  if ([...$mic.options].some(o=>o.value===cur)) $mic.value = cur;
}
navigator.mediaDevices?.addEventListener?.('devicechange', ()=>listMics().catch(()=>{}));
listMics().catch(()=>{});

// toolbar behavior
(function setupToolbar(){
  // generate 4..60px list if not present
  const dl = document.getElementById('sizes4to60');
  if (dl && !dl.children.length) {
    let s=''; for(let i=4;i<=60;i++) s+=`<option value="${i}">`; dl.insertAdjacentHTML('beforeend', s);
  }
  const tb = document.getElementById("ntb");
  tb.addEventListener("click", e=>{
    const b = e.target.closest("button"); if(!b) return;
    const cmd = b.dataset.cmd, list=b.dataset.list;
    if (cmd==="undo"||cmd==="redo"){ document.execCommand(cmd); $notes.focus(); return; }
    if (list==="ul"){ document.execCommand("insertUnorderedList"); $notes.focus(); return; }
    if (list==="ol"){ document.execCommand("insertOrderedList"); $notes.focus(); return; }
    if (b.id==="quote"){ document.execCommand("formatBlock", false, "blockquote"); $notes.focus(); return; }
    if (b.id==="h1"){ document.execCommand("formatBlock", false, "h1"); $notes.focus(); return; }
    if (b.id==="h2"){ document.execCommand("formatBlock", false, "h2"); $notes.focus(); return; }
  });
  // precise font size via px input (searchable/scrollable datalist)
  document.getElementById("fontSizePx").addEventListener("change", ()=>{
    const px = parseInt(document.getElementById("fontSizePx").value||"",10);
    if (!px || px<4 || px>60) return;
    wrapSelectionWithStyle({fontSize: px+"px"});
    $notes.focus();
  });
  // color & highlight (single apply)
  document.getElementById("txtColor").addEventListener("input", e=>{
    wrapSelectionWithStyle({color: e.target.value}); $notes.focus();
  });
  document.getElementById("hlColor").addEventListener("input", e=>{
    wrapSelectionWithStyle({"backgroundColor": e.target.value}); $notes.focus(); e.target.blur();
  });
  document.getElementById("clearFmt").addEventListener("click", ()=>{
    document.execCommand("removeFormat"); $notes.focus();
  });
})();
function wrapSelectionWithStyle(styleObj){
  const sel = window.getSelection();
  if (!sel || sel.rangeCount===0) return;
  const r = sel.getRangeAt(0);
  if (r.collapsed) return;
  const span = document.createElement("span");
  Object.assign(span.style, styleObj);
  r.surroundContents(span);
}

// TAB = indent in notes (SHIFT+TAB outdent)
$notes.addEventListener("keydown", e=>{
  if (e.key==="Tab"){
    e.preventDefault();
    if (e.shiftKey) {
      // remove up to 4 leading nbsp/spaces of current block
      const sel = window.getSelection(); if(!sel||sel.rangeCount===0) return;
      const r = sel.getRangeAt(0);
      const block = r.startContainer.closest ? r.startContainer.closest("div,p,li,h1,h2,blockquote") : $notes;
      if (!block) return;
      block.normalize();
      block.firstChild && (block.firstChild.textContent = (block.firstChild.textContent||"").replace(/^(\u00a0| ){1,4}/,""));
    } else {
      document.execCommand("insertText", false, "\u00a0\u00a0\u00a0\u00a0");
    }
  }
});

// === Realtime WS (v3) ===
function toPCM16Bytes(f32, sr){
  const ratio = sr / 16000, len = Math.floor(f32.length / ratio), out = new Int16Array(len);
  for (let o=0,i=0;o<len;o++,i+=ratio){ let s=f32[i|0]; s=Math.max(-1,Math.min(1,s)); out[o]=s<0?s*0x8000:s*0x7FFF; }
  return out.buffer;
}
async function openWS(){
  const tr = await fetch(`${API}/api/aai-token?expires_in_seconds=300`);
  if (!tr.ok) { $status.textContent = "token err"; throw new Error("Token fetch failed"); }
  const {token} = await tr.json();
  const url = `wss://streaming.assemblyai.com/v3/ws?sample_rate=16000&encoding=pcm_s16le&token=${token}`;
  const s = new WebSocket(url); s.binaryType="arraybuffer";

  s.onopen  = () => { $status.textContent = "live"; reconnects=0; };
  s.onerror = () => { $status.textContent = "ws error"; };
  s.onclose = async (e) => {
    $status.textContent = `closed (${e.code||"?"})`;
    if (running && el("b_autoretry").checked && !stopping && reconnects<6) {
      await new Promise(r=>setTimeout(r, 300 + reconnects*250)); reconnects++; try{ ws = await openWS(); }catch{}
    }
  };
  s.onmessage = (m) => {
    if (typeof m.data !== "string") return;
    try {
      const j = JSON.parse(m.data);
      const txt = j.formatted_transcript || j.transcript || (j.turn&&(j.turn.formatted_transcript||j.turn.transcript)) || j.text;
      if (txt) {
        const wantTS = el("b_timestamps").checked;
        if (el("showSentences").checked) {
          const done = /[.!?]\s*$/.test(txt.trim());
          if (done) {
            const t = ((Date.now() - (startTs||Date.now()))/1000)|0;
            const mm = String((t/60)|0).padStart(2,"0"), ss = String(t%60).padStart(2,"0");
            const prefix = wantTS ? `[${mm}:${ss}] ` : "";
            transcriptText += prefix + txt.trim() + "\n";
            sentBuf = "";
          } else { sentBuf = txt + " "; }
          $live.textContent = transcriptText + sentBuf;
        } else { $live.textContent = txt; }
        if (shouldAutoscroll($live)) $live.scrollTop = $live.scrollHeight;
      }
      if (typeof j.confidence === "number") { confidenceAvg += j.confidence; confN++; }
    } catch {}
  };
  return s;
}
function shouldAutoscroll(elm){
  if (!el("b_autoscroll").checked) return false;
  const nearBottom = (elm.scrollHeight - elm.scrollTop - elm.clientHeight) < 24;
  return nearBottom;
}

async function start(){
  if (running) return;
  stopping=false; $status.textContent="starting…";
  const deviceId = $mic.value || undefined;
  mediaStream = await navigator.mediaDevices.getUserMedia({audio:{deviceId, channelCount:1}, video:false});
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  source = audioCtx.createMediaStreamSource(mediaStream);
  processor = audioCtx.createScriptProcessor(4096,1,1);
  try { ws = await openWS(); } catch (e) { alert("Live transcription failed to open. Check Console."); return; }
  processor.onaudioprocess = (e)=>{
    if (!ws || ws.readyState !== 1 || paused) return;
    const ch = e.inputBuffer.getChannelData(0);
    const sr = e.inputBuffer.sampleRate || (audioCtx && audioCtx.sampleRate) || 44100;
    ws.send(toPCM16Bytes(ch, sr));
    let peak=0; for(let i=0;i<ch.length;i++) peak=Math.max(peak, Math.abs(ch[i]));
    $vu.style.width = Math.min(100, (peak*200)|0) + "%";
  };
  source.connect(processor); processor.connect(audioCtx.destination);
  running=true; paused=false; startTs=Date.now(); transcriptText=""; sentBuf="";
}
async function stop(){
  paused=false; stopping=true;
  if (processor){ processor.disconnect(); processor=null; }
  if (source){ source.disconnect(); source=null; }
  if (audioCtx){ await audioCtx.close().catch(()=>{}); audioCtx=null; }
  if (mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
  if (ws){ try{ ws.close(); }catch{} ws=null; }
  running=false; $status.textContent="stopped"; $vu.style.width="0%";
}
$start.onclick = start; $pause.onclick = ()=>{ paused=true; $status.textContent="paused"; };
$resume.onclick = ()=>{ paused=false; $status.textContent="live"; };
$stop.onclick = stop;

// marker hotkey
document.addEventListener("keydown", e=>{
  if (!el("b_markers").checked) return;
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase()==="m"){
    e.preventDefault();
    const t = ((Date.now() - (startTs||Date.now()))/1000)|0;
    const mm = String((t/60)|0).padStart(2,"0"), ss = String(t%60).padStart(2,"0");
    const line = `[⏱ ${mm}:${ss}] `;
    $notes.focus();
    document.execCommand("insertText", false, line);
    $live.textContent += `\n${line}\n`;
    if (shouldAutoscroll($live)) $live.scrollTop = $live.scrollHeight;
  }
});

// Save → Airtable (+ Make)
$save.onclick = async ()=>{
  const duration = startTs ? Math.round((Date.now()-startTs)/1000) : 0;
  const payload = {
    title: $title.value || (className?`${className} — ${new Date().toISOString().slice(0,10)}`:"Lecture"),
    class_name: className || $class.value || "",
    duration_seconds: duration,
    confidence: confN ? confidenceAvg/confN : undefined,
    notes_html: ($notes.innerText.trim()==="" ? "<p>[No Notes]</p>" : $notes.innerHTML),
    transcript_text: transcriptText + (sentBuf||"")
  };
  $status.textContent="saving…";
  try{
    const r = await fetch(`${API}/api/save`, {method:"POST", headers:{'content-type':'application/json'}, body: JSON.stringify(payload)});
    const j = await r.json().catch(()=>({}));
    if (r.ok) $status.textContent="saved ✓"; else { $status.textContent="save failed"; alert(JSON.stringify(j||{})); }
  }catch(e){ $status.textContent="save failed"; alert(e.message); }
};

// Summary → append to Notes and (optionally) polish transcript
$summary.onclick = async ()=>{
  const $pol = el('polish'); if ($pol){ $pol.style.display='inline-block'; $pol.textContent='summarizing…'; }
  try{
    const body = {
      prompt: "Create a concise smart summary of this lecture. Include key topics, bullet points, action items, and a short glossary if terms appear.",
      notes_html: $notes.innerHTML,
      transcript_text: transcriptText + (sentBuf||"")
    };
    const r = await fetch(API+"/api/ask",{method:"POST",headers:{'content-type':'application/json'},body:JSON.stringify(body)});
    const j = await r.json();
    if (j && j.answer){
      const h2 = "<h2>Summary</h2>";
      $notes.insertAdjacentHTML("beforeend", h2 + `<div>${j.answer.replace(/\n/g,"<br>")}</div>`);
    }
    if ($pol){ $pol.textContent='summary ✓'; setTimeout(()=>{$pol.style.display='none';},1500); }
  }catch(e){ if ($pol) $pol.style.display='none'; alert("Summary failed: "+e.message); }
};

// Ask AI mini chat
el("askBtn").onclick = ()=>{ el("askPanel").style.display="block"; };
el("askClose").onclick = ()=>{ el("askPanel").style.display="none"; };
el("askSend").onclick = async ()=>{
  el("askOut").textContent = "Thinking…";
  try{
    const body = {
      prompt: el("askInput").value,
      include_context: el("askCtx").checked,
      notes_html: $notes.innerHTML,
      transcript_text: transcriptText + (sentBuf||"")
    };
    const r = await fetch(API+"/api/ask",{method:"POST",headers:{'content-type':'application/json'},body:JSON.stringify(body)});
    const j = await r.json(); askAnswer = (j && (j.answer||j.text)) || "No answer.";
    el("askOut").textContent = askAnswer;
  }catch(e){ el("askOut").textContent = "Error: "+e.message; }
};
el("askPaste").onclick = ()=>{ if (askAnswer) { $notes.insertAdjacentHTML("beforeend", `<div>${askAnswer.replace(/\n/g,"<br>")}</div>`); } };

(function init(){
  document.body.style.overflowX = 'hidden';
